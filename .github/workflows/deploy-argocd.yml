name: Backend → EKS Deploy (GitOps)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: Build & Trigger GitOps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Gradle Build
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push
        env:
          ECR: ${{ secrets.ECR_BACKEND_URI }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR:$TAG -t $ECR:latest .
          docker push $ECR:$TAG
          docker push $ECR:latest

      # ── GitOps: Infra 리포지토리의 매니페스트 업데이트 ──
      
      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: anjin0910-afk/awseksinfra  # 대상 인프라 레포
          token: ${{ secrets.GH_PAT }}          # GitHub Secrets에 등록한 PAT
          path: infra-repo 

      - name: Update Manifest Image
        run: |
          cd infra-repo
          # manifests/back/backend.yaml 파일의 image 부분을 새 태그로 교체
          sed -i "s|image:.*|image: ${{ secrets.ECR_BACKEND_URI }}:${{ github.sha }}|g" manifests/back/backend.yaml
          
      - name: Commit and Push to Infra Repo
        run: |
          cd infra-repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/back/backend.yaml
          
          # 변경사항이 있는 경우에만 커밋 및 푸시
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: update backend image to ${{ github.sha }} [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi
